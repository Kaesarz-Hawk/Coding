<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Bengal Strike: Kaesarz vs Habib Dalal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0806;
    --fg: #f0e6d3;
    --muted: #6b5e4f;
    --accent: #d4a017;
    --accent-glow: #ffcc33;
    --kaesarz: #dc143c;
    --kaesarz-dark: #8b0000;
    --habib: #008b8b;
    --habib-dark: #004d4d;
    --card: rgba(20,16,12,0.92);
    --border: rgba(212,160,23,0.3);
    --hp-green: #22c55e;
    --hp-yellow: #eab308;
    --hp-red: #ef4444;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  canvas#game-canvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
  }
  .overlay {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .overlay.active { pointer-events: all; }
  .overlay > div { display: none; }
  .overlay.active > div { display: flex; }

  /* MENU SCREEN */
  #menu-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    text-align: center;
    padding: 20px;
  }
  .menu-subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: clamp(14px, 2vw, 20px);
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.8;
  }
  .menu-title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(36px, 6vw, 80px);
    line-height: 1.05;
    color: var(--fg);
    text-shadow: 0 0 40px rgba(212,160,23,0.3);
  }
  .menu-vs {
    display: flex; align-items: center; gap: 30px;
    margin: 20px 0;
  }
  .menu-fighter {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .menu-fighter-portrait {
    width: clamp(80px, 12vw, 130px);
    height: clamp(100px, 15vw, 160px);
    border-radius: 12px;
    border: 2px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .menu-fighter-portrait.kaesarz {
    background: linear-gradient(135deg, var(--kaesarz-dark), var(--kaesarz));
  }
  .menu-fighter-portrait.habib {
    background: linear-gradient(135deg, var(--habib-dark), var(--habib));
  }
  .menu-fighter-portrait .initial {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(36px, 5vw, 60px);
    color: rgba(255,255,255,0.2);
  }
  .menu-fighter-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(16px, 2.5vw, 24px);
    color: var(--fg);
  }
  .menu-fighter-name.kaesarz { color: var(--kaesarz); }
  .menu-fighter-name.habib { color: var(--habib); }
  .vs-text {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(28px, 4vw, 48px);
    color: var(--accent);
    text-shadow: 0 0 30px rgba(212,160,23,0.5);
  }
  #engage-btn {
    margin-top: 16px;
    padding: 16px 60px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(18px, 2.5vw, 26px);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--bg);
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    border: none;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(212,160,23,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  #engage-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(212,160,23,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  #engage-btn:active { transform: scale(0.97); }
  #engage-btn::after {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
    animation: btnShine 3s infinite;
  }
  @keyframes btnShine {
    0% { transform: translateX(-100%) rotate(25deg); }
    100% { transform: translateX(100%) rotate(25deg); }
  }
  .controls-hint {
    margin-top: 24px;
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    font-size: clamp(11px, 1.4vw, 14px);
    color: var(--muted);
    font-weight: 400;
  }
  .controls-hint span {
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .controls-hint kbd {
    color: var(--accent);
    font-weight: 600;
  }

  /* HUD */
  #hud-overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; z-index: 15;
    padding: 12px 20px;
    display: none;
  }
  #hud-overlay.active { display: block; }
  .hud-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px;
  }
  .hud-fighter-panel {
    flex: 1; max-width: 420px;
  }
  .hud-fighter-panel.right { text-align: right; }
  .hud-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(13px, 1.8vw, 18px);
    margin-bottom: 4px;
  }
  .hud-name.kaesarz { color: var(--kaesarz); }
  .hud-name.habib { color: var(--habib); }
  .hud-bar-container {
    width: 100%;
    height: 18px;
    background: rgba(0,0,0,0.7);
    border-radius: 3px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .hud-bar-delayed, .hud-bar-fill {
    position: absolute; top: 0; height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .hud-bar-delayed { z-index: 1; opacity: 0.6; }
  .hud-bar-fill { z-index: 2; }
  .hud-hp-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    z-index: 3;
    font-size: 11px; font-weight: 700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .hud-sub-bars {
    display: flex; gap: 6px; margin-top: 4px;
  }
  .hud-sub-bar {
    flex: 1; height: 8px;
    background: rgba(0,0,0,0.6);
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    position: relative;
  }
  .hud-sub-bar-fill {
    position: absolute; top:0; left:0; height:100%;
    border-radius: 1px;
    transition: width 0.15s ease;
  }
  .hud-specials {
    display: flex; gap: 6px; margin-top: 4px;
  }
  .hud-specials.right { justify-content: flex-end; }
  .hud-special-icon {
    padding: 2px 8px;
    font-size: 10px; font-weight: 600;
    border-radius: 3px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    transition: all 0.2s;
  }
  .hud-special-icon.ready {
    color: var(--accent-glow);
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(212,160,23,0.3);
  }
  .hud-center {
    display: flex; flex-direction: column; align-items: center;
    min-width: 100px;
  }
  .hud-timer {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(24px, 3vw, 36px);
    color: var(--fg);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    line-height: 1;
  }
  .hud-combo {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 2vw, 20px);
    color: var(--accent-glow);
    text-shadow: 0 0 10px rgba(212,160,23,0.5);
    opacity: 0;
    transition: opacity 0.2s;
    min-height: 24px;
  }
  .hud-combo.visible { opacity: 1; }

  /* PAUSE MENU */
  #pause-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
  }
  .pause-title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 42px;
    color: var(--accent);
    letter-spacing: 8px;
  }
  .pause-btn {
    padding: 12px 48px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--fg);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 220px;
    text-align: center;
  }
  .pause-btn:hover {
    background: rgba(212,160,23,0.15);
    border-color: var(--accent);
    color: var(--accent-glow);
  }

  /* GAME OVER */
  #gameover-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    text-align: center;
    padding: 30px;
  }
  .go-label {
    font-size: 16px; letter-spacing: 6px;
    color: var(--muted); text-transform: uppercase;
  }
  .go-winner {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(32px, 5vw, 56px);
    line-height: 1.1;
  }
  .go-winner.kaesarz { color: var(--kaesarz); text-shadow: 0 0 40px rgba(220,20,60,0.4); }
  .go-winner.habib { color: var(--habib); text-shadow: 0 0 40px rgba(0,139,139,0.4); }
  .go-stats {
    display: flex; gap: 30px; margin: 10px 0;
    flex-wrap: wrap; justify-content: center;
  }
  .go-stat {
    text-align: center;
  }
  .go-stat-val {
    font-size: 28px; font-weight: 700; color: var(--accent);
  }
  .go-stat-label {
    font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
  }
  .go-btns { display: flex; gap: 12px; margin-top: 10px; }

  /* Intro cutscene text */
  #intro-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    z-index: 12;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    pointer-events: none;
  }
  #intro-overlay.active { display: flex; }
  .intro-text {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(20px, 3.5vw, 40px);
    color: var(--fg);
    text-align: center;
    opacity: 0;
    transition: opacity 0.6s ease;
    text-shadow: 0 0 30px rgba(0,0,0,0.8);
  }
  .intro-text.visible { opacity: 1; }
  .intro-fight {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(48px, 8vw, 100px);
    color: var(--accent-glow);
    text-shadow: 0 0 60px rgba(212,160,23,0.6), 0 0 120px rgba(212,160,23,0.3);
    opacity: 0;
    transform: scale(2);
    transition: all 0.3s ease;
  }
  .intro-fight.visible { opacity: 1; transform: scale(1); }

  @media (max-width: 600px) {
    .hud-sub-bars, .hud-specials { display: none; }
    .hud-top { padding: 8px 10px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- MENU SCREEN -->

  <div id="gameover-screen">
    <div class="go-label">Victory Belongs To</div>
    <div class="go-winner" id="go-winner-name">KAESARZ</div>
    <div class="go-stats">
      <div class="go-stat"><div class="go-stat-val" id="go-dmg">0</div><div class="go-stat-label">Damage Dealt</div></div>

<script>
/* ========================================================================
   ROYAL BENGAL STRIKE: KAESARZ vs HABIB DALAL
   Complete single-file fighting game
   ======================================================================== */

// ==================== SOUND MANAGER ====================
class SoundManager {
  constructor() {
    this.ctx = null;
    this.enabled = true;
    this.bgmPlaying = false;
  }
  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      this.enabled = false;
    }
  }
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }
  /* Generate a short noise-burst SFX */
  playSFX(type) {
    if (!this.enabled || !this.ctx) return;
    this.resume();
    const now = this.ctx.currentTime;
    const gain = this.ctx.createGain();
    gain.connect(this.ctx.destination);
    if (type === 'punch') {
      const osc = this.ctx.createOscillator();
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(gain); osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'kick') {
      const osc = this.ctx.createOscillator();
      osc.type = 'square'; osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.12);
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain); osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'special') {
      const osc = this.ctx.createOscillator();
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.35);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(gain); osc.start(now); osc.stop(now + 0.4);
    } else if (type === 'block') {
      const osc = this.ctx.createOscillator();
      osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.connect(gain); osc.start(now); osc.stop(now + 0.06);
    } else if (type === 'ko') {
      const osc = this.ctx.createOscillator();
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.6);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
      osc.connect(gain); osc.start(now); osc.stop(now + 0.7);
    } else if (type === 'whoosh') {
      const bufferSize = this.ctx.sampleRate * 0.1;
      const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      const noise = this.ctx.createBufferSource();
      noise.buffer = buffer;
      const filt = this.ctx.createBiquadFilter();
      filt.type = 'bandpass'; filt.frequency.value = 2000; filt.Q.value = 0.5;
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      noise.connect(filt); filt.connect(gain);
      noise.start(now); noise.stop(now + 0.1);
    }
  }
  /* Placeholder for BGM integration */
  startBGM() { this.bgmPlaying = true; }
  stopBGM() { this.bgmPlaying = false; }
}

// ==================== PARTICLE SYSTEM ====================
class Particle {
  constructor(x, y, vx, vy, life, color, size, gravity, fadeOut) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.color = color;
    this.size = Math.max(0.5, size);
    this.gravity = gravity || 0;
    this.fadeOut = fadeOut !== false;
    this.dead = false;
  }
  update(dt) {
    this.vy += this.gravity * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  render(ctx) {
    const alpha = this.fadeOut ? Math.max(0, this.life / this.maxLife) : 1;
    const sz = Math.max(0.1, this.size * (0.3 + 0.7 * (this.life / this.maxLife)));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, sz, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class ParticleSystem {
  constructor() { this.particles = []; }
  add(p) { this.particles.push(p); }
  burst(x, y, count, color, speed, life, size, gravity) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = (Math.random() * 0.7 + 0.3) * (speed || 200);
      this.add(new Particle(
        x + (Math.random()-0.5)*6, y + (Math.random()-0.5)*6,
        Math.cos(angle)*spd, Math.sin(angle)*spd,
        (Math.random()*0.5+0.5)*(life||0.5),
        color || '#ffaa00',
        (Math.random()*0.5+0.5)*(size||3),
        gravity !== undefined ? gravity : 400,
        true
      ));
    }
  }
  directionalBurst(x, y, count, color, dirX, dirY, spread, speed, life, size, gravity) {
    for (let i = 0; i < count; i++) {
      const baseAngle = Math.atan2(dirY, dirX);
      const angle = baseAngle + (Math.random()-0.5)*spread;
      const spd = (Math.random()*0.6+0.4)*(speed||200);
      this.add(new Particle(
        x+(Math.random()-0.5)*4, y+(Math.random()-0.5)*4,
        Math.cos(angle)*spd, Math.sin(angle)*spd,
        (Math.random()*0.4+0.6)*(life||0.4),
        color||'#ffcc00',
        (Math.random()*0.5+0.5)*(size||2.5),
        gravity !== undefined ? gravity : 300,
        true
      ));
    }
  }
  trail(x, y, color, size) {
    this.add(new Particle(
      x+(Math.random()-0.5)*4, y+(Math.random()-0.5)*4,
      (Math.random()-0.5)*20, (Math.random()-0.5)*20 - 30,
      0.3+Math.random()*0.2, color||'#ff8800', size||2, -50, true
    ));
  }
  ember(x, y) {
    this.add(new Particle(
      x+Math.random()*800, y+Math.random()*100,
      (Math.random()-0.5)*15, -20-Math.random()*40,
      1.5+Math.random()*2, Math.random()>0.5?'#ff6600':'#ffaa33',
      1+Math.random()*1.5, -20, true
    ));
  }
  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update(dt);
      if (this.particles[i].dead) this.particles.splice(i, 1);
    }
  }
  render(ctx) {
    for (const p of this.particles) p.render(ctx);
  }
  clear() { this.particles.length = 0; }
}

// ==================== COMBAT TEXT MANAGER ====================
class CombatText {
  constructor(x, y, text, color, scale) {
    this.x = x; this.y = y;
    this.text = text; this.color = color;
    this.scale = scale || 1;
    this.vy = -120;
    this.life = 1.0; this.maxLife = 1.0;
    this.dead = false;
  }
  update(dt) {
    this.y += this.vy * dt;
    this.vy *= 0.97;
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  render(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);
    const s = this.scale * (0.8 + 0.4 * Math.min(1, (1 - this.life/this.maxLife)*4));
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.scale(s, s);
    ctx.font = '700 22px Rajdhani, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText(this.text, 1, 1);
    ctx.fillStyle = this.color;
    ctx.fillText(this.text, 0, 0);
    ctx.restore();
  }
}

class CombatTextManager {
  constructor() { this.texts = []; }
  add(x, y, text, color, scale) {
    this.texts.push(new CombatText(x, y - 60, text, color, scale));
  }
  update(dt) {
    for (let i = this.texts.length - 1; i >= 0; i--) {
      this.texts[i].update(dt);
      if (this.texts[i].dead) this.texts.splice(i, 1);
    }
  }
  render(ctx) {
    for (const t of this.texts) t.render(ctx);
  }
  clear() { this.texts.length = 0; }
}

// ==================== SCREEN SHAKE ====================
class ScreenShake {
  constructor() { this.intensity = 0; this.duration = 0; this.timer = 0; this.offsetX = 0; this.offsetY = 0; }
  trigger(intensity, duration) {
    this.intensity = Math.max(this.intensity, intensity);
    this.duration = Math.max(this.duration, duration);
    this.timer = this.duration;
  }
  update(dt) {
    if (this.timer > 0) {
      this.timer -= dt;
      const t = Math.max(0, this.timer / this.duration);
      const i = this.intensity * t;
      this.offsetX = (Math.random()-0.5)*2*i;
      this.offsetY = (Math.random()-0.5)*2*i;
      if (this.timer <= 0) { this.offsetX = 0; this.offsetY = 0; this.intensity = 0; }
    }
  }
  apply(ctx) {
    ctx.translate(this.offsetX, this.offsetY);
  }
}

// ==================== FIGHTER CLASS ====================
class Fighter {
  constructor(cfg) {
    this.name = cfg.name;
    this.tag = cfg.tag; // 'p1' or 'p2'
    this.x = cfg.x;
    this.groundY = cfg.groundY;
    this.y = cfg.groundY;
    this.vx = 0; this.vy = 0;
    this.facing = cfg.facing; // 1=right, -1=left
    this.width = 60; this.height = 130;

    this.maxHp = cfg.maxHp || 1000;
    this.hp = this.maxHp;
    this.maxStamina = 100;
    this.stamina = this.maxStamina;
    this.maxRage = 100;
    this.rage = 0;

    this.state = 'idle';
    this.stateTimer = 0;
    this.animTimer = 0;
    this.animFrame = 0;

    this.isAttacking = false;
    this.attackType = null;
    this.attackPhase = 0; // 0=windup, 1=active, 2=recovery
    this.hasHitThisAttack = false;
    this.isBlocking = false;
    this.comboCount = 0;
    this.maxCombo = 0;
    this.comboTimer = 0;
    this.totalDamageDealt = 0;

    this.special1CD = 0;
    this.special1MaxCD = cfg.special1CD || 15;
    this.special2CD = 0;
    this.special2MaxCD = cfg.special2CD || 20;

    this.statusEffects = [];
    this.hitFlash = 0;
    this.isKO = false;

    this.color = cfg.color;
    this.colorDark = cfg.colorDark;
    this.accentColor = cfg.accentColor;
    this.pantsColor = cfg.pantsColor;
    this.skinColor = cfg.skinColor || '#d4a574';
    this.hairColor = cfg.hairColor || '#1a1a1a';

    this.attacks = cfg.attacks;
    this.speed = cfg.speed || 300;
    this.jumpForce = cfg.jumpForce || -620;
    this.gravity = 1800;

    this.knockbackX = 0;
    this.knockbackY = 0;
    this.hitstun = 0;

    // Input flags (set externally)
    this.inLeft = false;
    this.inRight = false;
    this.inJump = false;
    this.inBlock = false;
    this.inPunch = false;
    this.inKick = false;
    this.inSpecial1 = false;
    this.inSpecial2 = false;

    // Consumed input flags (to avoid repeated triggers per frame)
    this._consumedPunch = false;
    this._consumedKick = false;
    this._consumedSpecial1 = false;
    this._consumedSpecial2 = false;
    this._consumedJump = false;
  }

  isOnGround() { return this.y >= this.groundY - 0.5; }

  hasStatusEffect(type) {
    return this.statusEffects.some(e => e.type === type);
  }

  applyStatusEffect(effect) {
    // Don't stack same type, refresh duration
    const existing = this.statusEffects.find(e => e.type === effect.type);
    if (existing) { existing.duration = effect.duration; existing.tickTimer = 0; }
    else this.statusEffects.push({ ...effect, tickTimer: 0 });
  }

  updateStatusEffects(dt) {
    for (let i = this.statusEffects.length - 1; i >= 0; i--) {
      const e = this.statusEffects[i];
      e.duration -= dt;
      if (e.damage) {
        e.tickTimer -= dt;
        if (e.tickTimer <= 0) {
          this.hp = Math.max(0, this.hp - e.damage);
          e.tickTimer = 1.0;
        }
      }
      if (e.duration <= 0) this.statusEffects.splice(i, 1);
    }
  }

  startAttack(type) {
    const atk = this.attacks[type];
    if (!atk) return;
    if (type === 'special1' && this.special1CD > 0) return;
    if (type === 'special2' && this.special2CD > 0) return;
    if (this.stamina < atk.stamina) return;

    this.stamina -= atk.stamina;
    this.isAttacking = true;
    this.attackType = type;
    this.attackPhase = 0;
    this.stateTimer = atk.windup || 0.08;
    this.hasHitThisAttack = false;
    this.state = type === 'punch' ? 'punch' : type === 'kick' ? 'kick' : type === 'special1' ? 'special1' : 'special2';
    this.vx *= 0.3;

    if (type === 'special1') this.special1CD = this.special1MaxCD;
    if (type === 'special2') this.special2CD = this.special2MaxCD;
  }

  update(dt, opponent) {
    this.updateStatusEffects(dt);

    if (this.isKO) {
      this.state = 'ko';
      this.applyPhysics(dt);
      return;
    }

    // Stun check
    if (this.hitstun > 0) {
      this.hitstun -= dt;
      this.state = 'stun';
      this.vx *= Math.pow(0.05, dt);
      this.applyPhysics(dt);
      return;
    }

    // Stamina regen (only when not attacking or blocking)
    if (!this.isAttacking && !this.isBlocking) {
      this.stamina = Math.min(this.maxStamina, this.stamina + 18 * dt);
    }

    // Cooldowns
    if (this.special1CD > 0) this.special1CD = Math.max(0, this.special1CD - dt);
    if (this.special2CD > 0) this.special2CD = Math.max(0, this.special2CD - dt);

    // Combo timer
    if (this.comboTimer > 0) {
      this.comboTimer -= dt;
      if (this.comboTimer <= 0) this.comboCount = 0;
    }

    // Hit flash decay
    if (this.hitFlash > 0) this.hitFlash -= dt * 6;

    // Process attack states
    if (this.isAttacking) {
      this.stateTimer -= dt;
      if (this.attackPhase === 0 && this.stateTimer <= 0) {
        this.attackPhase = 1; // Active
        this.stateTimer = this.attacks[this.attackType].active || 0.1;
      } else if (this.attackPhase === 1 && this.stateTimer <= 0) {
        this.attackPhase = 2; // Recovery
        this.stateTimer = this.attacks[this.attackType].recovery || 0.15;
      } else if (this.attackPhase === 2 && this.stateTimer <= 0) {
        this.isAttacking = false;
        this.attackType = null;
        this.attackPhase = 0;
      }
      this.applyPhysics(dt);
      return;
    }

    // Block
    if (this.inBlock && this.stamina >= 3 && this.isOnGround()) {
      this.state = 'block';
      this.isBlocking = true;
      this.vx *= Math.pow(0.1, dt);
      this.stamina -= 8 * dt;
      this.applyPhysics(dt);
      this.consumeInputs();
      return;
    } else {
      this.isBlocking = false;
    }

    // Attack inputs
    if (this.inPunch && !this._consumedPunch) { this._consumedPunch = true; this.startAttack('punch'); this.consumeInputs(); this.applyPhysics(dt); return; }
    if (this.inKick && !this._consumedKick) { this._consumedKick = true; this.startAttack('kick'); this.consumeInputs(); this.applyPhysics(dt); return; }
    if (this.inSpecial1 && !this._consumedSpecial1) { this._consumedSpecial1 = true; this.startAttack('special1'); this.consumeInputs(); this.applyPhysics(dt); return; }
    if (this.inSpecial2 && !this._consumedSpecial2) { this._consumedSpecial2 = true; this.startAttack('special2'); this.consumeInputs(); this.applyPhysics(dt); return; }

    // Jump
    if (this.inJump && !this._consumedJump && this.isOnGround()) {
      this._consumedJump = true;
      this.vy = this.jumpForce;
      this.state = 'jump';
    }

    // Horizontal movement
    if (this.inLeft) {
      this.vx = -this.speed;
      if (this.isOnGround()) this.state = 'walk';
    } else if (this.inRight) {
      this.vx = this.speed;
      if (this.isOnGround()) this.state = 'walk';
    } else {
      this.vx *= Math.pow(0.001, dt);
      if (this.isOnGround()) this.state = 'idle';
    }

    if (!this.isOnGround() && !this.isAttacking) this.state = 'jump';

    // Face opponent
    if (!this.isAttacking) {
      this.facing = opponent.x > this.x ? 1 : -1;
    }

    this.applyPhysics(dt);
  }

  consumeInputs() {
    this._consumedPunch = this.inPunch;
    this._consumedKick = this.inKick;
    this._consumedSpecial1 = this.inSpecial1;
    this._consumedSpecial2 = this.inSpecial2;
    this._consumedJump = this.inJump;
  }

  clearInputs() {
    this.inLeft = false; this.inRight = false;
    this.inJump = false; this.inBlock = false;
    this.inPunch = false; this.inKick = false;
    this.inSpecial1 = false; this.inSpecial2 = false;
    this._consumedPunch = false; this._consumedKick = false;
    this._consumedSpecial1 = false; this._consumedSpecial2 = false;
    this._consumedJump = false;
  }

  applyPhysics(dt) {
    this.x += (this.vx + this.knockbackX) * dt;
    this.y += (this.vy + this.knockbackY) * dt;
    this.vy += this.gravity * dt;

    // Knockback decay
    this.knockbackX *= Math.pow(0.01, dt);
    this.knockbackY *= Math.pow(0.01, dt);

    // Ground
    if (this.y >= this.groundY) {
      this.y = this.groundY;
      this.vy = 0;
    }

    // Wall clamping
    const arenaLeft = 60;
    const arenaRight = 1220;
    if (this.x < arenaLeft) { this.x = arenaLeft; this.vx = 0; this.knockbackX = 0; }
    if (this.x > arenaRight) { this.x = arenaRight; this.vx = 0; this.knockbackX = 0; }

    // Animation timer
    this.animTimer += dt;
  }

  getHitbox() {
    // Attack hitbox when in active phase
    if (!this.isAttacking || this.attackPhase !== 1) return null;
    const atk = this.attacks[this.attackType];
    const range = atk.range || 70;
    return {
      x: this.x + this.facing * 20,
      y: this.y - 65,
      w: range,
      h: 50
    };
  }

  getHurtbox() {
    return {
      x: this.x - 25,
      y: this.y - this.height,
      w: 50,
      h: this.height
    };
  }
}

// ==================== AI CONTROLLER ====================
class AIController {
  constructor(fighter, opponent) {
    this.fighter = fighter;
    this.opponent = opponent;
    this.decisionTimer = 0;
    this.baseInterval = 0.25;
    this.action = 'idle';
    this.behavior = 'balanced';
    this.reactionBuffer = 0;
  }

  update(dt) {
    const f = this.fighter;
    const o = this.opponent;
    const hpPct = f.hp / f.maxHp;

    // Update behavior
    if (hpPct > 0.65) this.behavior = 'balanced';
    else if (hpPct > 0.3) this.behavior = 'defensive';
    else this.behavior = 'evasive';

    this.decisionTimer -= dt;
    if (this.decisionTimer <= 0) {
      this.makeDecision();
      this.decisionTimer = this.baseInterval + Math.random() * 0.15;
    }

    // Execute current action
    f.clearInputs();
    const dist = Math.abs(f.x - o.x);
    const toRight = o.x > f.x;

    switch (this.action) {
      case 'approach':
        if (toRight) f.inRight = true; else f.inLeft = true;
        break;
      case 'retreat':
        if (toRight) f.inLeft = true; else f.inRight = true;
        break;
      case 'punch': f.inPunch = true; break;
      case 'kick': f.inKick = true; break;
      case 'special1': f.inSpecial1 = true; break;
      case 'special2': f.inSpecial2 = true; break;
      case 'block': f.inBlock = true; break;
      case 'approach_attack':
        if (dist > 85) { if (toRight) f.inRight = true; else f.inLeft = true; }
        else f.inPunch = true;
        break;
      case 'jump_attack':
        if (f.isOnGround()) f.inJump = true;
        if (!f.isOnGround() && dist < 100) f.inKick = true;
        else if (dist > 85) { if (toRight) f.inRight = true; else f.inLeft = true; }
        break;
      case 'idle':
      default: break;
    }

    // React to opponent attacks - attempt block
    if (o.isAttacking && o.attackPhase === 0 && dist < 120 && Math.random() < 0.6) {
      f.inBlock = true;
    }
  }

  makeDecision() {
    const f = this.fighter;
    const o = this.opponent;
    const dist = Math.abs(f.x - o.x);
    const canSp1 = f.special1CD <= 0 && f.stamina >= f.attacks.special1.stamina;
    const canSp2 = f.special2CD <= 0 && f.stamina >= f.attacks.special2.stamina;
    const r = Math.random();

    switch (this.behavior) {
      case 'balanced':
        if (dist < 85) {
          if (canSp1 && r < 0.12) this.action = 'special1';
          else if (canSp2 && r < 0.2) this.action = 'special2';
          else if (r < 0.55) this.action = 'punch';
          else if (r < 0.78) this.action = 'kick';
          else if (r < 0.88) this.action = 'block';
          else this.action = 'retreat';
        } else if (dist < 180) {
          if (r < 0.6) this.action = 'approach';
          else if (r < 0.75) this.action = 'approach_attack';
          else if (canSp1 && r < 0.85) this.action = 'special1';
          else this.action = 'idle';
        } else {
          if (r < 0.7) this.action = 'approach';
          else this.action = 'idle';
        }
        break;

      case 'defensive':
        if (dist < 85) {
          if (o.isAttacking) this.action = 'block';
          else if (r < 0.3) this.action = 'punch';
          else if (r < 0.45) this.action = 'kick';
          else if (r < 0.7) this.action = 'retreat';
          else this.action = 'block';
        } else if (dist < 160) {
          if (r < 0.35) this.action = 'approach_attack';
          else if (r < 0.55) this.action = 'approach';
          else if (r < 0.7) this.action = 'idle';
          else this.action = 'retreat';
        } else {
          if (r < 0.5) this.action = 'approach';
          else this.action = 'idle';
        }
        break;

      case 'evasive':
        if (dist < 100) {
          if (canSp1 && r < 0.25) this.action = 'special1';
          else if (r < 0.65) this.action = 'retreat';
          else if (r < 0.8) this.action = 'block';
          else this.action = 'jump_attack';
        } else if (dist < 200) {
          if (r < 0.3) this.action = 'approach';
          else if (r < 0.5) this.action = 'retreat';
          else if (r < 0.65 && canSp2) this.action = 'special2';
          else this.action = 'idle';
        } else {
          if (r < 0.5) this.action = 'approach';
          else this.action = 'idle';
        }
        break;
    }
  }
}

// ==================== ARENA RENDERER ====================
class ArenaRenderer {
  constructor(canvas) {
    this.w = canvas.width;
    this.h = canvas.height;
    this.groundY = 560;
    this.emberTimer = 0;
  }
  resize(w, h) { this.w = w; this.h = h; this.groundY = Math.floor(h * 0.77); }
  render(ctx, particles, dt) {
    const w = this.w, h = this.h, gy = this.groundY;

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, gy);
    skyGrad.addColorStop(0, '#0a0608');
    skyGrad.addColorStop(0.4, '#1a0e0a');
    skyGrad.addColorStop(0.7, '#2a1510');
    skyGrad.addColorStop(1, '#1a0d08');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, w, gy);

    // Distant structure silhouettes
    ctx.fillStyle = '#0f0906';
    // Left temple
    ctx.beginPath();
    ctx.moveTo(50, gy); ctx.lineTo(80, gy-180); ctx.lineTo(100, gy-200);
    ctx.lineTo(120, gy-180); ctx.lineTo(150, gy);
    ctx.fill();
    // Right temple
    ctx.beginPath();
    ctx.moveTo(w-150, gy); ctx.lineTo(w-120, gy-170); ctx.lineTo(w-100, gy-190);
    ctx.lineTo(w-80, gy-170); ctx.lineTo(w-50, gy);
    ctx.fill();
    // Center palace
    ctx.fillStyle = '#120a07';
    ctx.beginPath();
    ctx.moveTo(w*0.3, gy); ctx.lineTo(w*0.4, gy-120);
    ctx.lineTo(w*0.45, gy-140); ctx.lineTo(w*0.5, gy-155);
    ctx.lineTo(w*0.55, gy-140); ctx.lineTo(w*0.6, gy-120);
    ctx.lineTo(w*0.7, gy);
    ctx.fill();

    // Moon
    ctx.fillStyle = 'rgba(255,220,160,0.08)';
    ctx.beginPath(); ctx.arc(w*0.8, 80, 40, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,220,160,0.15)';
    ctx.beginPath(); ctx.arc(w*0.8, 80, 25, 0, Math.PI*2); ctx.fill();

    // Ground
    const floorGrad = ctx.createLinearGradient(0, gy, 0, h);
    floorGrad.addColorStop(0, '#1a120e');
    floorGrad.addColorStop(0.3, '#140e0a');
    floorGrad.addColorStop(1, '#0a0606');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, gy, w, h - gy);

    // Ground line
    ctx.strokeStyle = 'rgba(212,160,23,0.25)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();

    // Floor tiles (perspective lines)
    ctx.strokeStyle = 'rgba(212,160,23,0.06)';
    ctx.lineWidth = 1;
    for (let i = 1; i <= 8; i++) {
      const ly = gy + (h - gy) * (i / 8);
      ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(w, ly); ctx.stroke();
    }
    for (let i = -5; i <= 5; i++) {
      const bx = w/2 + i * 120;
      ctx.beginPath(); ctx.moveTo(w/2, gy); ctx.lineTo(bx, h); ctx.stroke();
    }

    // Side torches
    this.drawTorch(ctx, 70, gy - 60);
    this.drawTorch(ctx, w - 70, gy - 60);

    // Ambient ember particles
    this.emberTimer -= dt;
    if (this.emberTimer <= 0) {
      particles.ember(0, gy - 50);
      this.emberTimer = 0.15 + Math.random() * 0.2;
    }

    // Vignette
    const vigGrad = ctx.createRadialGradient(w/2, h/2, w*0.25, w/2, h/2, w*0.7);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, w, h);
  }

  drawTorch(ctx, x, y) {
    // Torch body
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(x-4, y, 8, 60);
    // Fire glow
    const glowGrad = ctx.createRadialGradient(x, y-10, 2, x, y-10, 50);
    glowGrad.addColorStop(0, 'rgba(255,150,30,0.15)');
    glowGrad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(x-50, y-60, 100, 100);
    // Flame
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.ellipse(x, y-8, 5, 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffcc33';
    ctx.beginPath();
    ctx.ellipse(x, y-6, 3, 7, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

// ==================== FIGHTER RENDERER ====================
class FighterRenderer {
  render(ctx, fighter, particles) {
    ctx.save();
    ctx.translate(fighter.x, fighter.y);

    const f = fighter.facing;
    ctx.scale(f, 1);

    // Hit flash effect
    if (fighter.hitFlash > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(fighter.hitFlash * 30) * 0.5;
    }

    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, 2, 28, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Status effect auras
    if (fighter.hasStatusEffect('burn')) {
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 20;
      particles.trail(fighter.x * f, fighter.y - 60, '#ff6600', 2);
    }
    if (fighter.hasStatusEffect('stun')) {
      ctx.shadowColor = '#ffff00';
      ctx.shadowBlur = 15;
    }

    // Get pose data based on state
    const pose = this.getPose(fighter);

    // Draw back leg
    this.drawLimb(ctx, 0, -42, pose.backLegAngle, 48, 13, fighter.pantsColor, fighter.colorDark);
    // Draw back arm
    this.drawLimb(ctx, -8, -85, pose.backArmAngle, 40, 10, fighter.skinColor, fighter.colorDark);
    // Draw body
    this.drawBody(ctx, fighter, pose);
    // Draw front leg
    this.drawLimb(ctx, 4, -42, pose.frontLegAngle, 48, 13, fighter.pantsColor, fighter.colorDark);
    // Draw front arm
    this.drawLimb(ctx, 8, -85, pose.frontArmAngle, 40, 10, fighter.skinColor, fighter.colorDark);
    // Draw head
    this.drawHead(ctx, fighter, pose);

    // Reset shadow
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    ctx.restore();

    // Special move trail particles (in world space)
    if (fighter.isAttacking && fighter.attackPhase === 1) {
      if (fighter.attackType === 'special1') {
        const hx = fighter.x + fighter.facing * 55;
        const hy = fighter.y - 65;
        particles.trail(hx, hy, fighter.accentColor, 4);
        particles.directionalBurst(hx, hy, 2, fighter.accentColor, fighter.facing, 0, 0.5, 100, 0.2, 2, 0);
      } else if (fighter.attackType === 'special2') {
        const hx = fighter.x + fighter.facing * 30;
        const hy = fighter.y - 50;
        for (let i = 0; i < 3; i++) {
          particles.add(new Particle(
            hx + (Math.random()-0.5)*40, hy + (Math.random()-0.5)*40,
            (Math.random()-0.5)*60, (Math.random()-0.5)*60,
            0.3, fighter.accentColor, 3+Math.random()*3, 0, true
          ));
        }
      }
    }

    // Stun stars
    if (fighter.hasStatusEffect('stun')) {
      const t = performance.now() / 200;
      for (let i = 0; i < 3; i++) {
        const a = t + i * Math.PI * 2 / 3;
        const sx = fighter.x + Math.cos(a) * 20;
        const sy = fighter.y - fighter.height - 10 + Math.sin(a) * 8;
        ctx.fillStyle = '#ffee00';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('*', sx, sy);
      }
    }
  }

  getPose(f) {
    const t = f.animTimer;
    switch(f.state) {
      case 'idle':
        return {
          bodyY: Math.sin(t * 3) * 2,
          frontArmAngle: -30 + Math.sin(t * 2) * 5,
          backArmAngle: 25 + Math.sin(t * 2 + 1) * 5,
          frontLegAngle: -5 + Math.sin(t * 2.5) * 3,
          backLegAngle: 5 - Math.sin(t * 2.5) * 3,
          headTilt: Math.sin(t * 2) * 1.5
        };
      case 'walk': {
        const wc = Math.sin(t * 10);
        return {
          bodyY: Math.abs(wc) * 4,
          frontArmAngle: wc * 35,
          backArmAngle: -wc * 35,
          frontLegAngle: -wc * 30,
          backLegAngle: wc * 30,
          headTilt: 0
        };
      }
      case 'jump':
        return {
          bodyY: 0,
          frontArmAngle: -60,
          backArmAngle: 40,
          frontLegAngle: 20,
          backLegAngle: -15,
          headTilt: -3
        };
      case 'punch': {
        const prog = f.attackPhase === 0 ? f.stateTimer / (f.attacks.punch.windup||0.08) :
                     f.attackPhase === 1 ? 0 : 1 - f.stateTimer / (f.attacks.punch.recovery||0.15);
        const ext = f.attackPhase === 1 ? 1 : (f.attackPhase === 0 ? -0.3 * (1-prog) : 0.7 * prog);
        return {
          bodyY: f.attackPhase === 1 ? -3 : 0,
          frontArmAngle: -80 * ext,
          backArmAngle: 30,
          frontLegAngle: -10 * ext,
          backLegAngle: 10,
          headTilt: -5 * ext
        };
      }
      case 'kick': {
        const ext = f.attackPhase === 1 ? 1 : (f.attackPhase === 0 ? -0.2 : 0.6);
        return {
          bodyY: f.attackPhase === 1 ? -5 : 0,
          frontArmAngle: -40,
          backArmAngle: 50,
          frontLegAngle: -80 * ext,
          backLegAngle: 15,
          headTilt: f.attackPhase === 1 ? 3 : 0
        };
      }
      case 'special1': {
        const ext = f.attackPhase === 1 ? 1 : (f.attackPhase === 0 ? -0.3 : 0.5);
        return {
          bodyY: f.attackPhase === 1 ? -4 : 0,
          frontArmAngle: -85 * ext,
          backArmAngle: -40 * ext,
          frontLegAngle: -20 * ext,
          backLegAngle: -10 * ext,
          headTilt: -8 * ext
        };
      }
      case 'special2': {
        const ext = f.attackPhase === 1 ? 1 : (f.attackPhase === 0 ? -0.2 : 0.5);
        return {
          bodyY: 0,
          frontArmAngle: 60 * ext,
          backArmAngle: 60 * ext,
          frontLegAngle: 10,
          backLegAngle: -10,
          headTilt: 5 * ext
        };
      }
      case 'block':
        return {
          bodyY: 2,
          frontArmAngle: -70,
          backArmAngle: -50,
          frontLegAngle: -8,
          backLegAngle: 12,
          headTilt: -2
        };
      case 'stun':
        return {
          bodyY: 5,
          frontArmAngle: 40 + Math.sin(t*15)*10,
          backArmAngle: 50,
          frontLegAngle: 5,
          backLegAngle: -5,
          headTilt: 10 + Math.sin(t*12)*5
        };
      case 'ko':
        return {
          bodyY: 0,
          frontArmAngle: 70,
          backArmAngle: 60,
          frontLegAngle: 30,
          backLegAngle: -20,
          headTilt: 25
        };
      default:
        return { bodyY:0, frontArmAngle:-25, backArmAngle:25, frontLegAngle:-5, backLegAngle:5, headTilt:0 };
    }
  }

  drawBody(ctx, fighter, pose) {
    const by = -80 + pose.bodyY;
    // Torso
    ctx.fillStyle = fighter.color;
    ctx.beginPath();
    ctx.moveTo(-18, by);
    ctx.lineTo(18, by);
    ctx.lineTo(15, by + 38);
    ctx.lineTo(-15, by + 38);
    ctx.closePath();
    ctx.fill();

    // Belt
    ctx.fillStyle = fighter.accentColor;
    ctx.fillRect(-16, by + 32, 32, 5);

    // Shoulder pads
    ctx.fillStyle = fighter.accentColor;
    ctx.beginPath(); ctx.arc(-18, by + 4, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(18, by + 4, 6, 0, Math.PI*2); ctx.fill();

    // Chest detail
    ctx.strokeStyle = fighter.colorDark;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, by + 5);
    ctx.lineTo(0, by + 30);
    ctx.stroke();
  }

  drawLimb(ctx, ox, oy, angleDeg, length, width, color, outlineColor) {
    const rad = angleDeg * Math.PI / 180;
    const ex = ox + Math.sin(rad) * length;
    const ey = oy + Math.cos(rad) * length;

    // Outline
    ctx.strokeStyle = outlineColor;
    ctx.lineWidth = width + 3;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();

    // Fill
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();

    // Joint circle
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(ox, oy, width/2 - 1, 0, Math.PI*2); ctx.fill();
  }

  drawHead(ctx, fighter, pose) {
    const hx = 0;
    const hy = -95 + pose.bodyY;

    // Neck
    ctx.fillStyle = fighter.skinColor;
    ctx.fillRect(-5, hy + 12, 10, 8);

    // Head circle
    ctx.fillStyle = fighter.skinColor;
    ctx.beginPath(); ctx.arc(hx, hy, 16, 0, Math.PI*2); ctx.fill();

    // Hair/helmet
    ctx.fillStyle = fighter.hairColor;
    ctx.beginPath();
    ctx.arc(hx, hy - 4, 17, Math.PI, Math.PI * 2);
    ctx.fill();

    // Fighter-specific head details
    if (fighter.tag === 'p1') {
      // Kaesarz: Tiger-ear spikes
      ctx.fillStyle = fighter.color;
      ctx.beginPath();
      ctx.moveTo(-14, hy - 10); ctx.lineTo(-10, hy - 24); ctx.lineTo(-4, hy - 12);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(14, hy - 10); ctx.lineTo(10, hy - 24); ctx.lineTo(4, hy - 12);
      ctx.fill();
      // Gold stripes on hair
      ctx.strokeStyle = fighter.accentColor;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-8, hy-16); ctx.lineTo(-4, hy-8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8, hy-16); ctx.lineTo(4, hy-8); ctx.stroke();
    } else {
      // Habib: Sleek hair flowing back
      ctx.fillStyle = fighter.hairColor;
      ctx.beginPath();
      ctx.moveTo(-14, hy-6); ctx.quadraticCurveTo(-22, hy-20, -18, hy+5);
      ctx.lineTo(-14, hy); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(14, hy-6); ctx.quadraticCurveTo(22, hy-20, 18, hy+5);
      ctx.lineTo(14, hy); ctx.fill();
      // Silver headband
      ctx.strokeStyle = fighter.accentColor;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(hx, hy, 17, -0.3, Math.PI+0.3, true); ctx.stroke();
    }

    // Eyes
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(pose.headTilt * Math.PI / 180);
    const eyeColor = fighter.tag === 'p1' ? '#ff3333' : '#33cccc';
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-6, -1, 4, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6, -1, 4, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = eyeColor;
    ctx.beginPath(); ctx.arc(-5, -1, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, -1, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-5, -1, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, -1, 1, 0, Math.PI*2); ctx.fill();

    // Mouth
    if (fighter.state === 'stun' || fighter.state === 'ko') {
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 6, 4, 0, Math.PI); ctx.stroke();
    } else if (fighter.isAttacking && fighter.attackPhase === 1) {
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(0, 6, 4, 3, 0, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-4, 6); ctx.lineTo(4, 5); ctx.stroke();
    }
    ctx.restore();
  }
}

// ==================== HUD MANAGER ====================
class HUDManager {
  constructor() {
    this.hpFillP1 = document.getElementById('hp-fill-p1');
    this.hpDelayP1 = document.getElementById('hp-delayed-p1');
    this.hpTextP1 = document.getElementById('hp-text-p1');
    this.staP1 = document.getElementById('sta-p1');
    this.rageP1 = document.getElementById('rage-p1');
    this.sp1P1 = document.getElementById('sp1-p1');
    this.sp2P1 = document.getElementById('sp2-p1');

    this.hpFillP2 = document.getElementById('hp-fill-p2');
    this.hpDelayP2 = document.getElementById('hp-delayed-p2');
    this.hpTextP2 = document.getElementById('hp-text-p2');
    this.staP2 = document.getElementById('sta-p2');
    this.rageP2 = document.getElementById('rage-p2');
    this.sp1P2 = document.getElementById('sp1-p2');
    this.sp2P2 = document.getElementById('sp2-p2');

    this.timerEl = document.getElementById('hud-timer');
    this.comboEl = document.getElementById('hud-combo');

    this.delayedHpP1 = 1000;
    this.delayedHpP2 = 1000;
  }

  update(p1, p2, matchTime) {
    const hpColor = (pct) => pct > 0.5 ? 'var(--hp-green)' : pct > 0.25 ? 'var(--hp-yellow)' : 'var(--hp-red)';

    // P1
    const p1pct = Math.max(0, p1.hp / p1.maxHp);
    this.hpFillP1.style.width = (p1pct * 100) + '%';
    this.hpFillP1.style.background = hpColor(p1pct);
    this.hpTextP1.textContent = Math.ceil(Math.max(0, p1.hp));
    this.delayedHpP1 += (p1.hp - this.delayedHpP1) * 0.05;
    const d1pct = Math.max(0, this.delayedHpP1 / p1.maxHp);
    this.hpDelayP1.style.width = (d1pct * 100) + '%';
    this.hpDelayP1.style.background = hpColor(d1pct);
    this.staP1.style.width = (p1.stamina / p1.maxStamina * 100) + '%';
    this.rageP1.style.width = (p1.rage / p1.maxRage * 100) + '%';
    this.sp1P1.classList.toggle('ready', p1.special1CD <= 0);
    this.sp2P1.classList.toggle('ready', p1.special2CD <= 0);

    // P2
    const p2pct = Math.max(0, p2.hp / p2.maxHp);
    this.hpFillP2.style.width = (p2pct * 100) + '%';
    this.hpFillP2.style.background = hpColor(p2pct);
    this.hpTextP2.textContent = Math.ceil(Math.max(0, p2.hp));
    this.delayedHpP2 += (p2.hp - this.delayedHpP2) * 0.05;
    const d2pct = Math.max(0, this.delayedHpP2 / p2.maxHp);
    this.hpDelayP2.style.width = (d2pct * 100) + '%';
    this.hpDelayP2.style.background = hpColor(d2pct);
    this.staP2.style.width = (p2.stamina / p2.maxStamina * 100) + '%';
    this.rageP2.style.width = (p2.rage / p2.maxRage * 100) + '%';
    this.sp1P2.classList.toggle('ready', p2.special1CD <= 0);
    this.sp2P2.classList.toggle('ready', p2.special2CD <= 0);

    // Timer
    const t = Math.max(0, Math.ceil(99 - matchTime));
    this.timerEl.textContent = t;
    if (t <= 10) this.timerEl.style.color = 'var(--hp-red)';
    else this.timerEl.style.color = 'var(--fg)';

    // Combo
    if (p1.comboCount > 1) {
      this.comboEl.textContent = p1.comboCount + ' HIT COMBO';
      this.comboEl.classList.add('visible');
    } else {
      this.comboEl.classList.remove('visible');
    }
  }

  reset() {
    this.delayedHpP1 = 1000;
    this.delayedHpP2 = 1000;
  }
}

// ==================== COMBAT RESOLVER ====================
class CombatResolver {
  static checkHit(attacker, defender, particles, combatText, screenShake, soundManager) {
    if (!attacker.isAttacking || attacker.attackPhase !== 1 || attacker.hasHitThisAttack) return;
    const hitbox = attacker.getHitbox();
    const hurtbox = defender.getHurtbox();
    if (!hitbox || !hurtbox) return;

    // AABB collision
    const hx = attacker.facing === 1 ? hitbox.x : hitbox.x - hitbox.w;
    if (hx + hitbox.w < hurtbox.x || hx > hurtbox.x + hurtbox.w ||
        hitbox.y + hitbox.h < hurtbox.y || hitbox.y > hurtbox.y + hurtbox.h) return;

    attacker.hasHitThisAttack = true;
    const atk = attacker.attacks[attacker.attackType];
    let damage = atk.damage;

    // Block check
    if (defender.isBlocking) {
      damage = Math.floor(damage * 0.25);
      soundManager.playSFX('block');
      particles.burst(defender.x + (attacker.facing > 0 ? -15 : 15), defender.y - 65, 6, '#88aacc', 120, 0.25, 2, 200);
      combatText.add(defender.x, defender.y, 'BLOCKED', '#88aacc', 0.8);
      screenShake.trigger(3, 0.1);
    } else {
      // Full hit
      soundManager.playSFX(attacker.attackType === 'punch' ? 'punch' : attacker.attackType === 'kick' ? 'kick' : 'special');
      const hitX = defender.x + (attacker.facing > 0 ? -15 : 15);
      const hitY = defender.y - 65;

      // Particles based on attack type
      if (attacker.attackType === 'special1') {
        particles.burst(hitX, hitY, 20, attacker.accentColor, 300, 0.5, 4, 200);
        particles.burst(hitX, hitY, 10, '#ffffff', 200, 0.3, 2, 100);
        screenShake.trigger(12, 0.35);
      } else if (attacker.attackType === 'special2') {
        particles.burst(hitX, hitY, 15, attacker.accentColor, 250, 0.4, 5, 100);
        screenShake.trigger(8, 0.25);
      } else {
        particles.burst(hitX, hitY, 10, '#ffcc44', 180, 0.3, 3, 300);
        particles.directionalBurst(hitX, hitY, 5, '#ffffff', -attacker.facing, 0, 0.8, 150, 0.2, 1.5, 200);
        screenShake.trigger(attacker.attackType === 'kick' ? 7 : 4, attacker.attackType === 'kick' ? 0.2 : 0.12);
      }

      // Knockback
      defender.knockbackX = attacker.facing * (atk.knockback || 100);
      defender.knockbackY = (atk.knockup || 0);
      defender.hitstun = atk.hitstun || 0.2;
      defender.hitFlash = 1;

      // Status effect
      if (atk.statusEffect) {
        defender.applyStatusEffect(atk.statusEffect);
      }

      // Combo tracking
      attacker.comboCount++;
      attacker.comboTimer = 1.5;
      if (attacker.comboCount > attacker.maxCombo) attacker.maxCombo = attacker.comboCount;

      // Combat text
      const txtColor = attacker.attackType.startsWith('special') ? '#ffdd44' : '#ffffff';
      const txtScale = attacker.attackType.startsWith('special') ? 1.3 : 1;
      combatText.add(defender.x, defender.y, '-' + damage, txtColor, txtScale);

      if (attacker.comboCount > 1) {
        combatText.add(defender.x + 30, defender.y - 20, attacker.comboCount + 'x', '#ffaa00', 0.7);
      }
    }

    // Apply damage
    defender.hp = Math.max(0, defender.hp - damage);
    attacker.totalDamageDealt += damage;

    // Rage gain
    attacker.rage = Math.min(attacker.maxRage, attacker.rage + 8);
    defender.rage = Math.min(defender.maxRage, defender.rage + 5);

    // Check KO
    if (defender.hp <= 0) {
      defender.isKO = true;
      defender.hitstun = 0;
      soundManager.playSFX('ko');
      screenShake.trigger(18, 0.5);
      particles.burst(defender.x, defender.y - 60, 40, '#ff4400', 350, 0.8, 5, 200);
      particles.burst(defender.x, defender.y - 60, 20, '#ffcc00', 250, 0.6, 3, 150);
      combatText.add(defender.x, defender.y - 40, 'K.O.', '#ff2200', 2.0);
    }
  }

  static pushApart(f1, f2) {
    const minDist = 50;
    const dx = f2.x - f1.x;
    const dist = Math.abs(dx);
    if (dist < minDist && dist > 0) {
      const push = (minDist - dist) / 2;
      const dir = dx > 0 ? 1 : -1;
      if (!f1.isAttacking) f1.x -= dir * push;
      if (!f2.isAttacking) f2.x += dir * push;
    }
  }
}

// ==================== MAIN GAME CLASS ====================
class Game {
  constructor() {
    this.canvas = document.getElementById('game-canvas');
    if (!this.canvas) throw new Error('Canvas element not found');
    this.ctx = this.canvas.getContext('2d');
    if (!this.ctx) throw new Error('Could not get 2D context');

    this.baseW = 1280;
    this.baseH = 720;
    this.scale = 1;
    this.offsetX = 0;
    this.offsetY = 0;

    this.sound = new SoundManager();
    this.particles = new ParticleSystem();
    this.combatText = new CombatTextManager();
    this.screenShake = new ScreenShake();
    this.arena = new ArenaRenderer(this.canvas);
    this.fighterRenderer = new FighterRenderer();
    this.hud = new HUDManager();

    this.player = null;
    this.enemy = null;
    this.ai = null;

    this.currentState = 'MENU';
    this.lastTime = 0;
    this.matchTime = 0;
    this.introTimer = 0;
    this.introPhase = 0;
    this.rafId = null;
    this.isRunning = false;

    // Menu background particles
    this.menuParticles = new ParticleSystem();
    this.menuEmberTimer = 0;

    // Key state
    this.keys = {};
    this._boundKeyDown = null;
    this._boundKeyUp = null;
    this._boundResize = null;
    this._boundVisibility = null;

    // DOM refs
    this.menuOverlay = document.getElementById('menu-overlay');
    this.introOverlay = document.getElementById('intro-overlay');
    this.hudOverlay = document.getElementById('hud-overlay');
    this.pauseOverlay = document.getElementById('pause-overlay');
    this.gameoverOverlay = document.getElementById('gameover-overlay');
    this.engageBtn = document.getElementById('engage-btn');

    this.pauseResumeBtn = document.getElementById('pause-resume');
    this.pauseRestartBtn = document.getElementById('pause-restart');
    this.pauseQuitBtn = document.getElementById('pause-quit');
    this.goRematchBtn = document.getElementById('go-rematch');
    this.goMenuBtn = document.getElementById('go-menu');
    this.goWinnerName = document.getElementById('go-winner-name');
    this.goDmg = document.getElementById('go-dmg');
    this.goCombos = document.getElementById('go-combos');
    this.goTime = document.getElementById('go-time');
  }

  init() {
    this.sound.init();
    this.resize();
    this.bindEvents();
    this.showState('MENU');
    this.startLoop();
  }

  resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth;
    const h = window.innerHeight;
    this.canvas.width = w * dpr;
    this.canvas.height = h * dpr;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.scale = Math.min(w / this.baseW, h / this.baseH);
    this.offsetX = (w - this.baseW * this.scale) / 2;
    this.offsetY = (h - this.baseH * this.scale) / 2;
    this.arena.resize(w, h);
    this.screenW = w;
    this.screenH = h;
  }

  bindEvents() {
    this._boundKeyDown = (e) => {
      this.keys[e.key.toLowerCase()] = true;
      if (e.key.toLowerCase() === 'p' && this.currentState === 'PLAYING') {
        this.showState('PAUSED');
      } else if (e.key.toLowerCase() === 'p' && this.currentState === 'PAUSED') {
        this.showState('PLAYING');
      }
      // Prevent scroll on game keys
      if (['w','a','s','d','j','k','u','i','p',' '].includes(e.key.toLowerCase())) {
        e.preventDefault();
      }
    };
    this._boundKeyUp = (e) => { this.keys[e.key.toLowerCase()] = false; };
    this._boundResize = () => this.resize();
    this._boundVisibility = () => {
      if (document.hidden && this.currentState === 'PLAYING') {
        this.showState('PAUSED');
      }
    };

    window.addEventListener('keydown', this._boundKeyDown);
    window.addEventListener('keyup', this._boundKeyUp);
    window.addEventListener('resize', this._boundResize);
    document.addEventListener('visibilitychange', this._boundVisibility);

    // Engage button - THE CRITICAL BUG FIX
    if (this.engageBtn) {
      this.engageBtn.addEventListener('click', () => {
        this.sound.resume();
        this.startMatch();
      });
    }

    // Pause buttons
    if (this.pauseResumeBtn) this.pauseResumeBtn.addEventListener('click', () => this.showState('PLAYING'));
    if (this.pauseRestartBtn) this.pauseRestartBtn.addEventListener('click', () => this.startMatch());
    if (this.pauseQuitBtn) this.pauseQuitBtn.addEventListener('click', () => this.quitToMenu());

    // Game over buttons
    if (this.goRematchBtn) this.goRematchBtn.addEventListener('click', () => this.startMatch());
    if (this.goMenuBtn) this.goMenuBtn.addEventListener('click', () => this.quitToMenu());
  }

  showState(state) {
    // Hide all overlays
    this.menuOverlay.classList.remove('active');
    this.introOverlay.classList.remove('active');
    this.hudOverlay.classList.remove('active');
    this.pauseOverlay.classList.remove('active');
    this.gameoverOverlay.classList.remove('active');

    this.currentState = state;

    switch(state) {
      case 'MENU':
        this.menuOverlay.classList.add('active');
        break;
      case 'INTRO_CUTSCENE':
        this.introOverlay.classList.add('active');
        this.introTimer = 0;
        this.introPhase = 0;
        this.introOverlay.innerHTML = '';
        break;
      case 'PLAYING':
        this.hudOverlay.classList.add('active');
        break;
      case 'PAUSED':
        this.hudOverlay.classList.add('active');
        this.pauseOverlay.classList.add('active');
        break;
      case 'GAME_OVER':
        this.hudOverlay.classList.add('active');
        this.gameoverOverlay.classList.add('active');
        break;
    }
  }

  startMatch() {
    this.particles.clear();
    this.combatText.clear();
    this.screenShake.intensity = 0;
    this.screenShake.timer = 0;
    this.matchTime = 0;
    this.hud.reset();

    const groundY = this.arena.groundY;

    // Create Kaesarz (Player)
    this.player = new Fighter({
      name: 'Kaesarz', tag: 'p1',
      x: 300, groundY: groundY, facing: 1,
      maxHp: 1000,
      color: '#dc143c', colorDark: '#8b0000',
      accentColor: '#ffd700', pantsColor: '#2a0808',
      skinColor: '#c4956a', hairColor: '#1a1a1a',
      speed: 310, jumpForce: -630,
      special1CD: 15, special2CD: 20,
      attacks: {
        punch: { damage: 42, stamina: 10, windup: 0.07, active: 0.08, recovery: 0.14, range: 70, knockback: 120, hitstun: 0.2 },
        kick: { damage: 68, stamina: 20, windup: 0.1, active: 0.1, recovery: 0.18, range: 85, knockback: 200, knockup: -80, hitstun: 0.35 },
        special1: { damage: 125, stamina: 40, windup: 0.15, active: 0.15, recovery: 0.25, range: 105, knockback: 280, knockup: -120, hitstun: 0.5, statusEffect: { type: 'burn', duration: 3, damage: 12, tickTimer: 0 } },
        special2: { damage: 85, stamina: 30, windup: 0.12, active: 0.12, recovery: 0.2, range: 130, knockback: 160, hitstun: 0.4, statusEffect: { type: 'stun', duration: 1.5, tickTimer: 0 } }
      }
    });

    // Create Habib Dalal (AI)
    this.enemy = new Fighter({
      name: 'Habib Dalal', tag: 'p2',
      x: 980, groundY: groundY, facing: -1,
      maxHp: 1000,
      color: '#008b8b', colorDark: '#004d4d',
      accentColor: '#c0c0c0', pantsColor: '#0a1520',
      skinColor: '#c8a882', hairColor: '#0a0a1a',
      speed: 290, jumpForce: -600,
      special1CD: 18, special2CD: 22,
      attacks: {
        punch: { damage: 36, stamina: 8, windup: 0.06, active: 0.07, recovery: 0.12, range: 70, knockback: 100, hitstun: 0.18 },
        kick: { damage: 58, stamina: 16, windup: 0.09, active: 0.09, recovery: 0.16, range: 85, knockback: 170, knockup: -60, hitstun: 0.3 },
        special1: { damage: 110, stamina: 35, windup: 0.12, active: 0.12, recovery: 0.22, range: 100, knockback: 250, knockup: -100, hitstun: 0.45 },
        special2: { damage: 0, stamina: 25, windup: 0.15, active: 0.3, recovery: 0.2, range: 0, knockback: 0, hitstun: 0, statusEffect: { type: 'guard', duration: 3, tickTimer: 0 } }
      }
    });

    this.ai = new AIController(this.enemy, this.player);

    this.showState('INTRO_CUTSCENE');
  }

  quitToMenu() {
    this.player = null;
    this.enemy = null;
    this.ai = null;
    this.particles.clear();
    this.combatText.clear();
    this.showState('MENU');
  }

  readPlayerInput() {
    if (!this.player) return;
    const p = this.player;
    // Only set true on held keys; the consumed flags prevent re-triggering
    const prev = {
      punch: p.inPunch, kick: p.inKick,
      special1: p.inSpecial1, special2: p.inSpecial2, jump: p.inJump
    };
    p.inLeft = !!this.keys['a'] || !!this.keys['arrowleft'];
    p.inRight = !!this.keys['d'] || !!this.keys['arrowright'];
    p.inJump = !!this.keys['w'] || !!this.keys['arrowup'];
    p.inBlock = !!this.keys['s'] || !!this.keys['arrowdown'];
    p.inPunch = !!this.keys['j'];
    p.inKick = !!this.keys['k'];
    p.inSpecial1 = !!this.keys['u'];
    p.inSpecial2 = !!this.keys['i'];

    // Edge detection for consumed flags
    if (p.inPunch && !prev.punch) p._consumedPunch = false;
    if (p.inKick && !prev.kick) p._consumedKick = false;
    if (p.inSpecial1 && !prev.special1) p._consumedSpecial1 = false;
    if (p.inSpecial2 && !prev.special2) p._consumedSpecial2 = false;
    if (p.inJump && !prev.jump) p._consumedJump = false;
  }

  updateIntro(dt) {
    this.introTimer += dt;

    const phases = [
      { time: 0, text: 'In the heart of the Bengal arena...', class: 'intro-text', id: 'it0' },
      { time: 1.8, text: 'KAESARZ', class: 'intro-text visible', id: 'it1', style: 'color:var(--kaesarz);font-size:clamp(32px,5vw,60px);' },
      { time: 3.2, text: 'VS', class: 'intro-text visible', id: 'it2', style: 'color:var(--accent);font-size:clamp(40px,6vw,72px);' },
      { time: 4.5, text: 'HABIB DALAL', class: 'intro-text visible', id: 'it3', style: 'color:var(--habib);font-size:clamp(32px,5vw,60px);' },
      { time: 6.2, text: 'FIGHT!', class: 'intro-fight', id: 'it4' }
    ];

    for (let i = 0; i < phases.length; i++) {
      const ph = phases[i];
      if (this.introTimer >= ph.time && !document.getElementById(ph.id)) {
        const el = document.createElement('div');
        el.id = ph.id;
        el.className = ph.class;
        el.textContent = ph.text;
        if (ph.style) el.style.cssText = ph.style;
        this.introOverlay.appendChild(el);
        // Trigger animation on next frame
        requestAnimationFrame(() => {
          if (ph.class.includes('visible')) return; // already has visible
          el.classList.add('visible');
        });
      }
      // Fade out text elements before next one
      if (i < phases.length - 1 && this.introTimer >= phases[i + 1].time - 0.3) {
        const el = document.getElementById(ph.id);
        if (el && !ph.class.includes('visible') && ph.id !== 'it4') {
          el.style.opacity = '0';
          el.style.transition = 'opacity 0.3s';
        }
      }
    }

    // Transition to playing
    if (this.introTimer >= 7.5) {
      this.showState('PLAYING');
    }
  }

  updatePlaying(dt) {
    this.matchTime += dt;

    // Read input
    this.readPlayerInput();
    this.ai.update(dt);

    // Update fighters
    this.player.update(dt, this.enemy);
    this.enemy.update(dt, this.player);

    // Handle Habib's Iron Guard (special2 - gives damage reduction buff)
    if (this.enemy.isAttacking && this.enemy.attackType === 'special2' && this.enemy.attackPhase === 1) {
      if (!this.enemy.hasStatusEffect('guard')) {
        this.enemy.applyStatusEffect({ type: 'guard', duration: 3, tickTimer: 0 });
      }
      this.enemy.hasHitThisAttack = true; // No hitbox for this move
      this.sound.playSFX('whoosh');
      this.particles.burst(this.enemy.x, this.enemy.y - 60, 8, '#c0c0c0', 100, 0.4, 3, -50);
    }

    // Apply guard damage reduction to enemy
    if (this.enemy.hasStatusEffect('guard')) {
      // Visual only - damage reduction handled at hit time
    }

    // Combat resolution
    CombatResolver.checkHit(this.player, this.enemy, this.particles, this.combatText, this.screenShake, this.sound);
    CombatResolver.checkHit(this.enemy, this.player, this.particles, this.combatText, this.screenShake, this.sound);

    // Push fighters apart
    CombatResolver.pushApart(this.player, this.enemy);

    // Update systems
    this.particles.update(dt);
    this.combatText.update(dt);
    this.screenShake.update(dt);

    // Update HUD
    this.hud.update(this.player, this.enemy, this.matchTime);

    // Check game over conditions
    if (this.player.isKO || this.enemy.isKO || this.matchTime >= 99) {
      this.endMatch();
    }
  }

  endMatch() {
    let winner = null;
    let winnerClass = '';
    if (this.player.isKO) {
      winner = this.enemy.name;
      winnerClass = 'habib';
    } else if (this.enemy.isKO) {
      winner = this.player.name;
      winnerClass = 'kaesarz';
    } else {
      // Time up - whoever has more HP
      if (this.player.hp >= this.enemy.hp) {
        winner = this.player.name;
        winnerClass = 'kaesarz';
      } else {
        winner = this.enemy.name;
        winnerClass = 'habib';
      }
    }

    this.goWinnerName.textContent = winner.toUpperCase();
    this.goWinnerName.className = 'go-winner ' + winnerClass;
    this.goDmg.textContent = this.player.totalDamageDealt;
    this.goCombos.textContent = this.player.maxCombo;
    this.goTime.textContent = Math.floor(this.matchTime) + 's';

    // Delay showing game over screen slightly for impact
    setTimeout(() => {
      if (this.currentState !== 'MENU') this.showState('GAME_OVER');
    }, 1200);
  }

  renderMenu(dt) {
    const ctx = this.ctx;
    const w = this.screenW, h = this.screenH;
    ctx.clearRect(0, 0, w, h);

    // Dark background with warm gradient
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w*0.7);
    grad.addColorStop(0, '#1a0e08');
    grad.addColorStop(0.5, '#0f0806');
    grad.addColorStop(1, '#060403');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Menu embers
    this.menuEmberTimer -= dt;
    if (this.menuEmberTimer <= 0) {
      this.menuParticles.ember(0, h);
      this.menuEmberTimer = 0.1 + Math.random() * 0.15;
    }
    this.menuParticles.update(dt);
    this.menuParticles.render(ctx);

    // Subtle vignette
    const vig = ctx.createRadialGradient(w/2, h/2, w*0.2, w/2, h/2, w*0.7);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, w, h);
  }

  renderIntro(dt) {
    const ctx = this.ctx;
    const w = this.screenW, h = this.screenH;
    ctx.clearRect(0, 0, w, h);

    // Dark background with dramatic lighting
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w*0.6);
    grad.addColorStop(0, '#1a0e08');
    grad.addColorStop(1, '#050303');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Side glows during intro
    if (this.introTimer > 1.5 && this.introTimer < 3.5) {
      const glow = ctx.createRadialGradient(w*0.2, h/2, 0, w*0.2, h/2, 200);
      glow.addColorStop(0, 'rgba(220,20,60,0.15)');
      glow.addColorStop(1, 'rgba(220,20,60,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);
    }
    if (this.introTimer > 4.0 && this.introTimer < 6.5) {
      const glow = ctx.createRadialGradient(w*0.8, h/2, 0, w*0.8, h/2, 200);
      glow.addColorStop(0, 'rgba(0,139,139,0.15)');
      glow.addColorStop(1, 'rgba(0,139,139,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);
    }
    if (this.introTimer > 6.0) {
      const glow = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, 300);
      glow.addColorStop(0, 'rgba(212,160,23,0.2)');
      glow.addColorStop(1, 'rgba(212,160,23,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);
    }
  }

  renderGame() {
    const ctx = this.ctx;
    const w = this.screenW, h = this.screenH;
    ctx.clearRect(0, 0, w, h);

    ctx.save();

    // Apply screen shake
    this.screenShake.apply(ctx);

    // Render arena background
    this.arena.render(ctx, this.particles, 0);

    // Render fighters (back one first for proper layering)
    const fighters = [this.player, this.enemy].sort((a, b) => a.y - b.y);
    for (const f of fighters) {
      this.fighterRenderer.render(ctx, f, this.particles);
    }

    // Render particles (on top of fighters)
    this.particles.render(ctx);

    // Render combat text
    this.combatText.render(ctx);

    ctx.restore();
  }

  startLoop() {
    this.isRunning = true;
    this.lastTime = performance.now();
    const loop = (timestamp) => {
      if (!this.isRunning) return;
      const rawDt = (timestamp - this.lastTime) / 1000;
      const dt = Math.min(rawDt, 0.05); // Cap at 50ms to prevent physics explosion
      this.lastTime = timestamp;

      try {
        switch (this.currentState) {
          case 'MENU':
            this.renderMenu(dt);
            break;
          case 'INTRO_CUTSCENE':
            this.updateIntro(dt);
            this.renderIntro(dt);
            break;
          case 'PLAYING':
            this.updatePlaying(dt);
            this.renderGame();
            break;
          case 'PAUSED':
            // Just render, don't update
            this.renderGame();
            break;
          case 'GAME_OVER':
            // Keep rendering with slow particles
            this.particles.update(dt);
            this.combatText.update(dt);
            this.screenShake.update(dt);
            this.renderGame();
            break;
        }
      } catch (err) {
        console.error('Game loop error:', err);
      }

      this.rafId = requestAnimationFrame(loop);
    };
    this.rafId = requestAnimationFrame(loop);
  }

  destroy() {
    this.isRunning = false;
    if (this.rafId) cancelAnimationFrame(this.rafId);
    if (this._boundKeyDown) window.removeEventListener('keydown', this._boundKeyDown);
    if (this._boundKeyUp) window.removeEventListener('keyup', this._boundKeyUp);
    if (this._boundResize) window.removeEventListener('resize', this._boundResize);
    if (this._boundVisibility) document.removeEventListener('visibilitychange', this._boundVisibility);
  }
}

// ==================== INITIALIZATION ====================
// Wrap in DOMContentLoaded to ensure all DOM elements exist before binding
window.addEventListener('DOMContentLoaded', () => {
  try {
    const game = new Game();
    game.init();
    // Expose for debugging if needed
    window._game = game;
  } catch (err) {
    console.error('FATAL: Game initialization failed:', err);
    // Show error on screen as last resort
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a0808;color:#ff4444;padding:30px 40px;border:2px solid #ff4444;border-radius:8px;font-family:monospace;font-size:14px;z-index:9999;max-width:90vw;word-break:break-word;';
    errDiv.textContent = 'Game failed to load: ' + err.message;
    document.body.appendChild(errDiv);
  }
});
</script>
