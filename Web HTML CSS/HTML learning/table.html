<!DOCTYPE html>
<head>
    <title>My Web Page for Tables</title>
</head>
<body>
    <h3>Tables in HTML</h3>
    <table border="1" cellspacing="0" cellpadding="5">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Kawsar</td>
            <td>22</td>
            <td>Dhaka</td>
        </tr>
        <tr>
            <td>Princess</td>
            <td>21</td>
            <td>Paradise</td>
        </tr>
        <tr>
            <td>Anakin</td>
            <td>40</td>
            <td>Planet Tatooine</td>
        </tr>

        </table>

        <br><br>
        <p>Table with caption:</p>
        <table border="2" center cellspacing="0" cellpadding="10">
            <caption>My Table Caption</caption>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
            <tr>
                <td>Kawsar</td>
                <td>22</td>
                <td>Dhaka</td>
            </tr>
        </table>

    </body>

    </html>
