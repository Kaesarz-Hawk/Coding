<!DOCTYPE html>
<html lang="en">

<head>

    <title>Forms learning</title>
</head>

<body>

    <form action="index.html" method="POST" enctype="multipart/form-data">

        <label for="username">username: </label>
        <input type="text" id="username" placeholder="your username" minlength="6"><br>

        <label for="password">password: </label>
        <input type="password" id="password"><br>

        <label for="email">email: </label>
        <input type="email" id="email" placeholder="kaesarz@gmail.com"><br>

        <label for="phone">phone #: </label>
        <input type="tel" id="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"><br>

        <label for="bday">birthdate: </label>
        <input type="date" id="bday"><br>

        <label for="quantity">quantity: </label>
        <input type="number" id="quantity" value="1"><br>

        <label>title: </label>
        <input type="radio" id="mr" name="title" value="mr"> <label for="mr">Mr.</label>
        <input type="radio" id="ms" name="title" value="ms"> <label for="ms">Ms.</label>
        <input type="radio" id="legend" name="title" value="legend"> <label for="legend">Legend</label><br>

    </form>
</body>

</html>
