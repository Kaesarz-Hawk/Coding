<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kaesarz Portfolio</title>
  <desc id="desc">Cinematic portfolio cover with dark glassmorphism background and blue cyan accents.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 210) rotate(30) scale(420 360)">
      <stop stop-color="#0066FF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0066FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(870 180) rotate(35) scale(400 340)">
      <stop stop-color="#00D4FF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="300" y1="170" x2="900" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#C0C0C0"/>
      <stop offset="1" stop-color="#0066FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="40" fill="#FFFFFF" fill-opacity="0.02" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <circle cx="360" cy="210" r="220" fill="url(#glowA)"/>
  <circle cx="870" cy="180" r="210" fill="url(#glowB)"/>
  <path d="M180 470C260 390 340 360 430 360C540 360 610 410 700 410C790 410 875 360 1020 240" stroke="#00D4FF" stroke-opacity="0.18" stroke-width="2"/>
  <path d="M170 170H1030" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <path d="M170 460H1030" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <circle cx="250" cy="140" r="6" fill="#0066FF"/>
  <circle cx="960" cy="500" r="6" fill="#00D4FF"/>
  <text x="120" y="245" fill="#FFFFFF" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="84" font-weight="700" letter-spacing="0.02em">Kaesarz</text>
  <text x="120" y="320" fill="url(#accent)" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="0.22em" text-transform="uppercase">Software Engineer</text>
