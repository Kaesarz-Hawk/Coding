  <rect x="120" y="430" width="240" height="54" rx="27" fill="#0066FF" fill-opacity="0.16" stroke="#0066FF" stroke-opacity="0.35"/>
  <text x="240" y="465" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Portfolio Preview</text>
